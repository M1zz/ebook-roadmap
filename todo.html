<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo · Anonymous Ebook Brand</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=JetBrains+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --text: #e8e4dc;
    --muted: #555;
    --muted2: #777;
    --p0: #c8a96e;
    --p1: #7eb8c8;
    --p2: #c87e9a;
    --p3: #8bc87e;
    --p4: #b87ec8;
    --done-text: #3a3a3a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* NAV */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 52px;
  }
  .nav-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .nav-links {
    display: flex;
    gap: 2px;
  }
  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 16px;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .nav-link:hover { color: var(--text); border-color: var(--border); }
  .nav-link.active {
    color: var(--text);
    border-color: var(--border);
    background: var(--surface);
  }

  /* HEADER */
  .header {
    padding: 56px 48px 40px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: end;
  }
  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .header-title em { font-style: italic; color: var(--accent); }
  .header-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--muted2);
    font-size: 16px;
    margin-top: 8px;
  }

  /* PROGRESS PANEL */
  .progress-panel {
    min-width: 240px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: 2px;
  }
  .progress-overall-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-overall-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 12px;
  }
  .progress-overall-num span {
    font-size: 14px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
  }
  .progress-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .phase-mini-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .phase-mini-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .phase-mini-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-mini-label { flex: 1; color: var(--muted); }
  .phase-mini-count { color: var(--text); }

  /* FILTER BAR */
  .filter-bar {
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
  }
  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
    white-space: nowrap;
  }
  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--muted); }
  .filter-btn.active {
    color: var(--bg);
    background: var(--text);
    border-color: var(--text);
  }
  .filter-btn[data-phase="0"].active { background: var(--p0); border-color: var(--p0); }
  .filter-btn[data-phase="1"].active { background: var(--p1); border-color: var(--p1); }
  .filter-btn[data-phase="2"].active { background: var(--p2); border-color: var(--p2); }
  .filter-btn[data-phase="3"].active { background: var(--p3); border-color: var(--p3); }
  .filter-btn[data-phase="4"].active { background: var(--p4); border-color: var(--p4); }

  .reset-btn {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .reset-btn:hover { color: #e87e7e; border-color: #e87e7e; }

  /* MAIN */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 48px 120px;
  }

  /* PHASE GROUP */
  .phase-group {
    margin-bottom: 48px;
    transition: opacity 0.2s;
  }
  .phase-group.hidden { display: none; }

  .phase-group-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 4px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .phase-group-bar {
    width: 3px;
    height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .phase-group-title-wrap {}
  .phase-group-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .phase-group-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
  }
  .phase-group-progress {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }
  .phase-group-progress strong {
    font-size: 18px;
    font-weight: 500;
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }
  .phase-progress-track {
    width: 80px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin-top: 4px;
  }
  .phase-progress-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* TODO ITEM */
  .todo-item {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item:hover { background: rgba(255,255,255,0.015); }

  .todo-main {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 0;
    cursor: pointer;
  }

  /* CHECKBOX */
  .todo-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .todo-item.done .todo-check {
    background: var(--phase-color, var(--accent));
    border-color: var(--phase-color, var(--accent));
  }
  .todo-check::after {
    content: '';
    width: 5px; height: 9px;
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    transform: rotate(45deg) translate(-1px, -1px);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .todo-item.done .todo-check::after { opacity: 1; }

  .todo-body { flex: 1; min-width: 0; }

  .todo-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .todo-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
    transition: color 0.2s;
  }
  .todo-item.done .todo-title {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }
  .todo-desc {
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    color: var(--muted2);
    line-height: 1.5;
    transition: color 0.2s;
  }
  .todo-item.done .todo-desc { color: var(--done-text); }

  .todo-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
    transition: color 0.15s;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .todo-expand-btn:hover { color: var(--text); }

  /* SUBTASKS */
  .subtask-panel {
    padding: 0 0 16px 36px;
    display: none;
  }
  .subtask-panel.open { display: block; }

  .subtask-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(42,42,42,0.5);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .subtask-item:last-child { border-bottom: none; }
  .subtask-item:hover { opacity: 0.8; }

  .subtask-check {
    width: 14px; height: 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .subtask-item.done .subtask-check {
    background: rgba(255,255,255,0.1);
    border-color: var(--muted);
  }
  .subtask-check::after {
    content: '';
    width: 3px; height: 6px;
    border-right: 1.5px solid var(--muted);
    border-bottom: 1.5px solid var(--muted);
    transform: rotate(45deg) translate(-1px, -1px);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .subtask-item.done .subtask-check::after { opacity: 1; }

  .subtask-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    line-height: 1.6;
    transition: color 0.2s;
  }
  .subtask-item.done .subtask-text {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }

  .tool-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }
  .tool-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* COMPLETION BANNER */
  .phase-complete-banner {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(139,200,126,0.06);
    border: 1px solid rgba(139,200,126,0.2);
    border-radius: 2px;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--p3);
  }
  .phase-complete-banner.show { display: flex; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 18px;
  }

  /* FOOTER */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
  }
  .footer-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .footer-stat strong { color: var(--accent); }

  @media (max-width: 640px) {
    .nav { padding: 0 20px; }
    .header { padding: 32px 20px 24px; grid-template-columns: 1fr; }
    .progress-panel { display: none; }
    .filter-bar { padding: 12px 20px; }
    .main { padding: 32px 20px 100px; }
    .footer { padding: 12px 20px; }
    .header-title { font-size: 30px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">The Pattern Finder · Roadmap</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Timeline</a>
    <a href="todo.html" class="nav-link active">Todo</a>
  </div>
</nav>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-eyebrow">Execution Checklist · 23 Tasks · 50+ Subtasks</div>
    <div class="header-title">Do the <em>Work</em></div>
    <div class="header-sub">하나씩 체크할 때마다 브랜드가 만들어진다.</div>
  </div>
  <div class="progress-panel">
    <div class="progress-overall-label">Overall Progress</div>
    <div class="progress-overall-num" id="overall-pct">0<span>%</span></div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="overall-bar" style="width:0%"></div>
    </div>
    <div class="phase-mini-list" id="phase-mini-list"></div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-phase="all">All</button>
  <button class="filter-btn" data-phase="0" style="--btn-color:var(--p0)">Phase 0 · Foundation</button>
  <button class="filter-btn" data-phase="1" style="--btn-color:var(--p1)">Phase 1 · Create</button>
  <button class="filter-btn" data-phase="2" style="--btn-color:var(--p2)">Phase 2 · Launch</button>
  <button class="filter-btn" data-phase="3" style="--btn-color:var(--p3)">Phase 3 · Grow</button>
  <button class="filter-btn" data-phase="4" style="--btn-color:var(--p4)">Phase 4 · Scale</button>
  <button class="filter-btn" data-phase="todo">미완료만</button>
  <button class="reset-btn" id="reset-btn">체크 초기화</button>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-stat">완료 <strong id="footer-done">0</strong> / <strong id="footer-total">0</strong> tasks</div>
  <div class="footer-stat">서브태스크 <strong id="footer-sub-done">0</strong> / <strong id="footer-sub-total">0</strong></div>
  <div class="footer-stat">Next: <strong id="footer-next">—</strong></div>
</div>

<script>
const PHASES = [
  {
    id: 0, color: 'var(--p0)', label: 'Phase 0', name: 'Foundation', period: 'Week 1–2',
    tasks: [
      {
        id: 't01', num: '01',

        ],

      },
      {
        id: 't02', num: '02',
        title: 'PERSONA BIO — 페르소나 바이오 작성',
        desc: '완전 허구 OK. "No PhD, just 10 years of obsessive observation" 톤으로 작성. 독자와 동급 위치 잡기.',
        subtasks: [
          '50단어 short bio 작성 (X/Twitter 프로필용)',
          '150단어 long bio 작성 (Gumroad About 섹션용)',
          'Claude에게 3가지 톤 버전 생성 요청 후 선택',
        ],

      },
      {
        id: 't03', num: '03',

        subtasks: [

      {
        id: 't04', num: '04',

        subtasks: [
          '핸들: @thepatternfinder 등 브랜드명 동일하게',
          '헤더 이미지: Canva로 "Brain science for real life" 배너',
          '첫 핀드 트윗 작성: 브랜드 선언문 형태',
          '뇌과학 팩트 트윗 3개 예약 발행',
        ],
        tools: ['X/Twitter', 'Canva', 'Buffer']
      },
      {
        id: 't05', num: '05',
        title: 'BRAND KIT — Canva 브랜드킷 세팅',
        desc: '책 커버·내지·SNS 포스트를 일관되게 만들기 위한 컬러팔레트 + 폰트 조합 고정.',
        subtasks: [
          'Primary color 1개 + 강조색 1개 선정',
          '폰트 조합: 제목용 serif + 본문용 sans-serif',
          '책 표지 마스터 템플릿 1개 완성',
          'SNS 포스트 정사각형 템플릿 1개 완성',
        ],
        tools: ['Canva Free/Pro']
      },
    ]
  },
  {
    id: 1, color: 'var(--p1)', label: 'Phase 1', name: 'Create', period: 'Week 3–6',
    tasks: [
      {
        id: 't06', num: '06',
        title: 'TOPIC RESEARCH — 주제 선정 및 경쟁 분석',
        desc: 'Gumroad에서 유사 주제 책 검색 → 리뷰 읽기 → 독자가 원하지만 아직 없는 것 찾기.',
        subtasks: [
          'Gumroad에서 "habits", "relationships", "psychology" 검색',

// STATE
let state = {};
const STORAGE_KEY = 'ebook_roadmap_v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function toggleTask(id) {
  state[id] = !state[id];
  saveState();
  render();
  updateStats();
}
function toggleSubtask(taskId, idx) {
  const key = `${taskId}_s${idx}`;
  state[key] = !state[key];
  saveState();
  render();
  updateStats();
}

// STATS
function getStats() {
  let totalTasks = 0, doneTasks = 0;
  let totalSub = 0, doneSub = 0;
  const phaseStats = [];
  PHASES.forEach(p => {
    let pt = 0, pd = 0;
    p.tasks.forEach(t => {
      totalTasks++; pt++;
      if (state[t.id]) { doneTasks++; pd++; }
      t.subtasks.forEach((_, i) => {
        totalSub++;
        if (state[`${t.id}_s${i}`]) doneSub++;
      });
    });
    phaseStats.push({ id: p.id, color: p.color, label: p.label, name: p.name, total: pt, done: pd });
  });
  return { totalTasks, doneTasks, totalSub, doneSub, phaseStats };
}

function updateStats() {
  const s = getStats();
  const pct = s.totalTasks ? Math.round(s.doneTasks / s.totalTasks * 100) : 0;

  document.getElementById('overall-pct').innerHTML = `${pct}<span>%</span>`;
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('footer-done').textContent = s.doneTasks;
  document.getElementById('footer-total').textContent = s.totalTasks;
  document.getElementById('footer-sub-done').textContent = s.doneSub;
  document.getElementById('footer-sub-total').textContent = s.totalSub;

  // Next task
  let nextLabel = '모두 완료! 🎉';
  outer: for (const p of PHASES) {
    for (const t of p.tasks) {
      if (!state[t.id]) { nextLabel = t.title.split('—')[0].trim(); break outer; }
    }
  }
  document.getElementById('footer-next').textContent = nextLabel;

  // Phase mini list
  const mini = document.getElementById('phase-mini-list');
  if (mini) {
    mini.innerHTML = s.phaseStats.map(ps => `
      <div class="phase-mini-item">
        <div class="phase-mini-dot" style="background:${ps.color}"></div>
        <span class="phase-mini-label">${ps.label}</span>
        <span class="phase-mini-count">${ps.done}/${ps.total}</span>
      </div>
    `).join('');
  }
}

// EXPAND STATE
let expandedTasks = new Set();

function render() {
  const main = document.getElementById('main');
  const activeFilter = document.querySelector('.filter-btn.active')?.dataset.phase || 'all';

  main.innerHTML = PHASES.map(phase => {
    const phaseDone = phase.tasks.filter(t => state[t.id]).length;
    const phaseTotal = phase.tasks.length;
    const phasePct = Math.round(phaseDone / phaseTotal * 100);

    const hidden = (activeFilter !== 'all' && activeFilter !== String(phase.id) &&
      !(activeFilter === 'todo' && phase.tasks.some(t => !state[t.id])));

    const tasksHtml = phase.tasks.map(task => {
      const isDone = !!state[task.id];
      if (activeFilter === 'todo' && isDone) return '';
      const isExpanded = expandedTasks.has(task.id);
      const subDone = task.subtasks.filter((_, i) => state[`${task.id}_s${i}`]).length;

      return `
        <div class="todo-item ${isDone ? 'done' : ''}" style="--phase-color:${phase.color}" id="item-${task.id}">
          <div class="todo-main" onclick="toggleTask('${task.id}')">
            <div class="todo-check"></div>
            <div class="todo-body">
              <div class="todo-num">TASK ${task.num} · ${phase.label}</div>
              <div class="todo-title">${task.title}</div>
              <div class="todo-desc">${task.desc}</div>
            </div>
            <button class="todo-expand-btn" onclick="event.stopPropagation(); toggleExpand('${task.id}')">
              ${isExpanded ? '▲ 접기' : '▼ ' + task.subtasks.length + '개 서브태스크' + (subDone > 0 ? ' ('+subDone+'/'+task.subtasks.length+')' : '')}
            </button>
          </div>
          <div class="subtask-panel ${isExpanded ? 'open' : ''}">
            ${task.subtasks.map((s, i) => {
              const sDone = !!state[`${task.id}_s${i}`];
              return `<div class="subtask-item ${sDone ? 'done' : ''}" onclick="toggleSubtask('${task.id}', ${i})">
                <div class="subtask-check"></div>
                <div class="subtask-text">${s}</div>
              </div>`;
            }).join('')}
            <div class="tool-chips">
              ${task.tools.map(t => `<span class="tool-chip">${t}</span>`).join('')}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="phase-group ${hidden ? 'hidden' : ''}" id="phase-${phase.id}">
        <div class="phase-group-header">
          <div class="phase-group-bar" style="background:${phase.color}"></div>
          <div class="phase-group-title-wrap">
            <div class="phase-group-eyebrow" style="color:${phase.color}">${phase.label} · ${phase.period}</div>
            <div class="phase-group-title">${phase.name}</div>
          </div>
          <div class="phase-group-progress">
            <strong style="color:${phase.color}">${phasePct}%</strong>
            ${phaseDone}/${phaseTotal}
            <div class="phase-progress-track">
              <div class="phase-progress-fill" style="background:${phase.color}; width:${phasePct}%"></div>
            </div>
          </div>
        </div>
        ${tasksHtml || '<div style="padding:16px 0;font-family:JetBrains Mono,monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;">이 단계 모두 완료 ✓</div>'}
        ${phaseDone === phaseTotal ? `<div class="phase-complete-banner show">✓ Phase ${phase.id} Complete — ${phase.name} 단계 완료!</div>` : ''}
      </div>
    `;
  }).join('');
}

function toggleExpand(taskId) {
  if (expandedTasks.has(taskId)) expandedTasks.delete(taskId);
  else expandedTasks.add(taskId);
  render();
}

// FILTER
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// RESET
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('모든 체크를 초기화할까요?')) {
    state = {};
    saveState();
    render();
    updateStats();
  }
});

// INIT
loadState();
render();
updateStats();
</script>
